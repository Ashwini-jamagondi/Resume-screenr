services:
  - type: web
    name: recruitai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: sqlite:///./resume_screener.db
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: STRONG_FIT_THRESHOLD
        value: 70.0